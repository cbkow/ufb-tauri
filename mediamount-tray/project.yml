name: MediaMountTray
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.unionfiles
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  MediaMountTray:
    type: application
    platform: macOS
    sources:
      - path: MediaMountTray
    settings:
      base:
        INFOPLIST_FILE: MediaMountTray/Info.plist
        CODE_SIGN_ENTITLEMENTS: MediaMountTray/MediaMountTray.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.unionfiles.mediamount-tray
        PRODUCT_NAME: UFB
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Z4S9VHV56
    dependencies:
      - target: FileProviderExtension

  FileProviderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FileProviderExtension
    settings:
      base:
        INFOPLIST_FILE: FileProviderExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: FileProviderExtension/FileProviderExtension.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.unionfiles.mediamount-tray.FileProvider
        PRODUCT_NAME: FileProviderExtension
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Z4S9VHV56
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    frameworks:
      - sdk: FileProvider.framework
