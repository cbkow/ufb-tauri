name: MediaMountTray
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.unionfiles
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  MediaMountTray:
    type: application
    platform: macOS
    sources:
      - path: MediaMountTray
    settings:
      base:
        INFOPLIST_FILE: MediaMountTray/Info.plist
        CODE_SIGN_ENTITLEMENTS: MediaMountTray/MediaMountTray.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.unionfiles.mediamount-tray
        PRODUCT_NAME: UFB
        COMBINE_HIDPI_IMAGES: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Z4S9VHV56
    dependencies:
      - target: FinderSync

  FinderSync:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderSync
    settings:
      base:
        INFOPLIST_FILE: FinderSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: FinderSync/FinderSync.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.unionfiles.mediamount-tray.FinderSync
        PRODUCT_NAME: FinderSync
        # Module name must differ from the target / product name so our
        # code can `import FinderSync` (the Apple framework) without
        # self-referencing the extension's own module.
        PRODUCT_MODULE_NAME: UFBFinderSync
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Z4S9VHV56
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
    frameworks:
      - sdk: FinderSync.framework
